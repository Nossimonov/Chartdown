name: CI

on:
  push:
    branches: [main, preview]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

  # Dogfooding our own marketplace Action (#60): the committed example SVGs
  # must never drift from their sources — verify renders and diffs.
  examples-verified:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Nossimonov/chartdown-action@v1
        with:
          root: examples
          mode: both
          markdown: "false"
          verify: "true"

  # Required check on main (issue #37 lanes): changes reach main only by PR
  # from the preview branch — no direct development against production.
  gatekeeper:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: PRs into main must come from preview
        run: |
          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "preview" ]; then
            echo "Changes reach main via PR from the preview branch, not from '${{ github.head_ref }}'" >&2
            exit 1
          fi
          echo "ok"
