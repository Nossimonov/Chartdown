# One Pages site, two lanes (issue #37): main builds the production playground
# at the site root; the preview branch builds a staging playground at /preview.
# A push to either branch redeploys BOTH from their current tips, since a Pages
# deploy replaces the whole site.
name: Deploy playground

on:
  push:
    branches: [main, preview]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main
      - uses: actions/checkout@v4
        with:
          ref: preview
          path: preview
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build production playground (main)
        working-directory: main
        run: |
          npm ci
          npm run build
      - name: Build staging playground (preview branch)
        working-directory: preview
        run: |
          npm ci
          npm run build
      - name: Assemble site (production at /, staging at /preview)
        run: |
          mkdir -p site
          cp -r main/playground/. site/
          mkdir -p site/preview
          cp -r preview/playground/. site/preview/
          # LLM discoverability (#57): the spec digest IS llms-full.txt.
          cp main/docs/spec/digest.md site/llms-full.txt
          cp preview/docs/spec/digest.md site/preview/llms-full.txt
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
